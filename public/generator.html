<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IARABÃO — Criar Post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* ── FONTES DO GERADOR ──────────────────────────── */
@font-face { font-family:'Antonio'; font-weight:700; src:url('/fonts/Antonio-Bold.ttf') format('truetype'); }
@font-face { font-family:'Antonio'; font-weight:600; src:url('/fonts/Antonio-SemiBold.ttf') format('truetype'); }
@font-face { font-family:'Poppins';  font-weight:400; src:url('/fonts/Poppins-Regular.ttf') format('truetype'); }
@font-face { font-family:'Poppins';  font-weight:500; src:url('/fonts/Poppins-Medium.ttf') format('truetype'); }

/* ── BASE ───────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #edeae4; color: #1a1a1a; }

header { background: #edeae4; border-bottom: 1px solid rgba(0,0,0,.1); padding: 0 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 10; height: 52px; gap: 6px; }
.brand { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.06em; color: #1a1a1a; text-decoration: none; margin-right: auto; line-height: 1; }
.nav-icon { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,.18); background: transparent; color: #999; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: all .15s; flex-shrink: 0; position: relative; }
.nav-icon:hover { border-color: #1a1a1a; color: #1a1a1a; background: rgba(0,0,0,.04); }
.nav-icon.active { background: #1a1a1a; border-color: #1a1a1a; color: white; }
.nav-icon.cta { background: #1a1a1a; border-color: #1a1a1a; color: white; }
.nav-icon.cta:hover { background: #444; border-color: #444; }
.nav-icon[title]:hover::after { content: attr(title); position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 8px; border-radius: 6px; white-space: nowrap; pointer-events: none; z-index: 100; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

.container { max-width: 960px; margin: 0 auto; padding: 24px 24px 60px; }

/* ── STEP TABS ──────────────────────────────────── */
.steps {
  display: flex; gap: 0; margin-bottom: 20px;
  background: #fafaf8; border-radius: 16px; overflow: hidden;
}
.step-tab {
  flex: 1; padding: 14px 20px; display: flex; align-items: center; gap: 10px;
  font-size: 0.72rem; font-weight: 700; color: #bbb;
  border-bottom: 2px solid transparent; transition: all .2s;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.step-tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
.step-tab.done   { color: #666; }
.step-num {
  width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
}
.step-tab.active .step-num { background: #1a1a1a; color: white; }
.step-tab.done   .step-num { background: #dcfce7; color: #166534; }

/* ── PANELS ─────────────────────────────────────── */
.panel { display: none; }
.panel.active { display: block; }

/* ── CARDS / SECTIONS ───────────────────────────── */
.section-card {
  background: #fafaf8; border-radius: 16px; padding: 20px 24px;
  margin-bottom: 10px;
}
.section-label {
  font-size: 0.62rem; font-weight: 700; color: #999;
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-num {
  width: 20px; height: 20px; border-radius: 50%; background: #1a1a1a;
  color: white; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
}

/* ── FORM ELEMENTS ──────────────────────────────── */
textarea {
  width: 100%; background: rgba(0,0,0,.04); border: 1px solid rgba(0,0,0,.1); border-radius: 10px;
  color: #1a1a1a; padding: 12px 14px; font-size: 0.9rem;
  font-family: inherit; resize: vertical; min-height: 140px; line-height: 1.6;
  transition: border-color .2s;
}
textarea:focus { outline: none; border-color: #1a1a1a; }
input[type="text"] {
  width: 100%; background: rgba(0,0,0,.04); border: 1px solid rgba(0,0,0,.1); border-radius: 10px;
  color: #1a1a1a; padding: 9px 12px; font-size: 0.88rem; font-family: inherit;
  transition: border-color .2s;
}
input[type="text"]:focus { outline: none; border-color: #1a1a1a; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg label { font-size: 0.62rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.07em; }

/* ── UPLOAD ─────────────────────────────────────── */
.upload-area {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; padding: 28px 20px;
  border: 2px dashed rgba(0,0,0,.15); border-radius: 12px; background: rgba(0,0,0,.03);
  cursor: pointer; transition: all .2s; text-align: center;
}
.upload-area:hover { border-color: #1a1a1a; background: rgba(0,0,0,.06); }
.upload-area.has-images { border-color: #1a1a1a; border-style: solid; background: rgba(0,0,0,.04); }
.upload-area-icon { font-size: 28px; }
.upload-area-text { font-size: 0.88rem; color: #555; font-weight: 600; }
.upload-area-sub  { font-size: 0.72rem; color: #aaa; line-height: 1.5; max-width: 380px; }

.detect-badge {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,.05); border: 1px solid rgba(0,0,0,.1); border-radius: 8px;
  padding: 9px 14px; margin-top: 10px;
  font-size: 0.78rem; color: #555; line-height: 1.5; font-weight: 600;
}

.thumb-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
.thumb-item {
  position: relative; width: 72px; height: 72px;
  border-radius: 10px; overflow: hidden; border: 2px solid rgba(0,0,0,.1);
}
.thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-num {
  position: absolute; top: 3px; left: 3px;
  background: rgba(0,0,0,.6); color: white;
  font-size: 10px; padding: 2px 5px; border-radius: 3px; font-weight: 700;
}

/* ── BUTTONS ────────────────────────────────────── */
.btn-primary {
  background: #1a1a1a; color: #edeae4; border: none; padding: 10px 26px;
  border-radius: 99px; font-size: 0.72rem; font-weight: 700; cursor: pointer;
  transition: opacity .15s; display: inline-flex; align-items: center; gap: 7px;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.btn-primary:hover:not(:disabled) { opacity: .75; }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; }
.btn-secondary {
  background: transparent; color: #777; border: 1.5px solid #ccc; padding: 9px 20px;
  border-radius: 99px; font-size: 0.68rem; font-weight: 700; cursor: pointer;
  transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.btn-secondary:hover { border-color: #1a1a1a; color: #1a1a1a; }
.btn-outline {
  background: transparent; color: #1a1a1a; border: 1.5px solid #1a1a1a;
  padding: 9px 20px; border-radius: 99px; font-size: 0.68rem; font-weight: 700;
  cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.btn-outline:hover { background: #1a1a1a; color: #edeae4; }
.row { display: flex; gap: 10px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.4); border-top-color: white;
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.pst { font-size: 0.78rem; color: #888; }
.err {
  color: #be123c; font-size: 0.82rem; padding: 10px 14px;
  background: #fff1f2; border-radius: 10px; border: 1px solid #fecdd3; margin-top: 12px;
}

/* ── PREVIEW LAYOUT ─────────────────────────────── */
.playout { display: grid; grid-template-columns: 540px 1fr; gap: 20px; align-items: start; }
.cwrap {
  width: 540px; border-radius: 16px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,.15); flex-shrink: 0; position: relative;
}
.cscale { transform-origin: top left; width: 1080px; height: 1350px; }

.snav { display: flex; gap: 6px; justify-content: center; margin-top: 12px; }
.sdot { width: 7px; height: 7px; border-radius: 50%; background: rgba(0,0,0,.2); cursor: pointer; transition: all .2s; }
.sdot.on { background: #1a1a1a; width: 18px; border-radius: 4px; }

.epanel { display: flex; flex-direction: column; gap: 10px; }

.capbox {
  background: #fafaf8; border-radius: 16px; padding: 16px;
}
.capt { font-size: 0.62rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.capbox p { font-size: 0.82rem; color: #555; line-height: 1.7; white-space: pre-wrap; max-height: 120px; overflow-y: auto; }
.cpbtn {
  background: none; border: 1.5px solid rgba(0,0,0,.15); color: #777;
  padding: 5px 13px; border-radius: 99px; font-size: 0.65rem; font-weight: 700;
  cursor: pointer; margin-top: 8px; transition: all .2s;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.cpbtn:hover { border-color: #1a1a1a; color: #1a1a1a; }

.dlbox {
  background: #fafaf8; border-radius: 16px; padding: 16px; text-align: center;
}
.dlbox h3 { font-size: 0.62rem; font-weight: 700; color: #999; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
.dlrow { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.dlst { margin-top: 8px; font-size: 0.72rem; color: #888; min-height: 14px; }

.swap-label {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; color: #777; border: 1.5px solid rgba(0,0,0,.15); padding: 6px 14px;
  border-radius: 99px; font-size: 0.65rem; font-weight: 700; cursor: pointer;
  margin-top: 8px; transition: all .15s; text-transform: uppercase; letter-spacing: 0.06em;
}
.swap-label:hover { border-color: #1a1a1a; color: #1a1a1a; }

/* ── DRAG OVERLAY ───────────────────────────────── */
.drag-overlay { position: absolute; inset: 0; cursor: grab; z-index: 20; border-radius: 16px; }
.drag-overlay.dragging { cursor: grabbing; }
.drag-hint { text-align: center; margin-top: 6px; font-size: 0.65rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; }

/* ── EXPORT ─────────────────────────────────────── */
#export-wrap { position: fixed; left: -9999px; top: 0; z-index: -1; pointer-events: none; }

/* ══════════════════════════════════════════════════
   INSTAGRAM CARD — 1080 × 1350 px (output format)
   ══════════════════════════════════════════════════ */
.igcard { width:1080px; height:1350px; position:relative; overflow:hidden; background:#201322; font-family:'Poppins',sans-serif; }
.igcard .layer-photo { position:absolute; inset:0; width:100%; height:100%; background-color:#2a1e2e; background-size:cover; background-repeat:no-repeat; z-index:1; }
.igcard .layer-gradient { position:absolute; inset:0; z-index:2; background:linear-gradient(to bottom, transparent 45%, rgba(0,0,0,0.18) 58%, rgba(0,0,0,0.80) 80%, rgba(0,0,0,0.92) 100%); pointer-events:none; }
.igcard .layer-circle { position:absolute; left:calc(787px - 177.5px); top:calc(698px - 177.5px); width:355px; height:355px; border-radius:50%; object-fit:cover; z-index:3; }
.igcard .layer-mask { position:absolute; inset:0; width:100%; height:100%; object-fit:fill; z-index:4; pointer-events:none; }
.igcard .layer-text { position:absolute; z-index:5; pointer-events:none; }
.txt-simples-block { left:0; right:0; top:1012px; bottom:135px; padding:0 68px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; }
.txt-simples-block .s-title { font-family:'Antonio',sans-serif; font-weight:700; font-size:65px; color:#49fcb6; text-transform:uppercase; line-height:1.05; text-align:center; width:100%; }
.txt-carr-block { left:0; right:0; top:877px; bottom:54px; padding:0 90px; display:flex; flex-direction:column; align-items:center; gap:16px; }
.txt-carr-block .c-title { font-family:'Poppins',sans-serif; font-weight:700; font-size:65px; color:#fff; text-transform:uppercase; line-height:1.05; text-align:center; width:100%; }
.txt-carr-block .c-sub { font-family:'Poppins',sans-serif; font-weight:400; font-size:28px; color:#fff; line-height:1.4; text-align:center; width:100%; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }
.txt-ci-block { left:0; right:0; top:810px; bottom:54px; padding:0 68px; display:flex; flex-direction:column; justify-content:flex-end; gap:14px; }
.txt-ci-block .ci-title { font-family:'Antonio',sans-serif; font-weight:600; font-size:44px; color:#49fcb6; text-transform:uppercase; line-height:1.1; }
.txt-ci-block .ci-body { font-family:'Poppins',sans-serif; font-weight:400; font-size:28px; color:#fff; line-height:1.3; display:-webkit-box; -webkit-line-clamp:6; -webkit-box-orient:vertical; overflow:hidden; }
.txt-cta { left:0; right:0; top:580px; font-family:'Antonio',sans-serif; font-weight:700; font-size:64px; color:#49fcb6; text-align:center; text-transform:uppercase; letter-spacing:3px; }
.txt-cta-sub { left:0; right:0; top:700px; font-family:'Poppins',sans-serif; font-weight:400; font-size:32px; color:#fff; text-align:center; line-height:1.6; }
.cta-logo { position:absolute; left:calc(50% - 75px); top:820px; width:150px; height:150px; z-index:5; }
.slide-num { position:absolute; right:90px; top:55px; font-family:'Poppins',sans-serif; font-size:24px; color:rgba(255,255,255,.25); z-index:5; }
.igcard.carousel-internal { background:#201322; }

@media (max-width: 820px) {
  .playout { grid-template-columns: 1fr; }
  .cwrap { width: 100%; max-width: 540px; }
}
</style>
</head>
<body>

<header>
  <a class="brand" href="/">IARABÃO</a>
  <a class="nav-icon" href="/" title="Home"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></a>
  <a class="nav-icon" href="/descartadas" title="Descartadas"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg></a>
  <a class="nav-icon" href="/fontes" title="Fontes"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="19" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/><line x1="6.5" y1="10.8" x2="10.5" y2="6.2"/><line x1="13.5" y1="6.2" x2="17.5" y2="10.8"/><line x1="17.5" y1="13.2" x2="13.5" y2="17.8"/><line x1="10.5" y1="17.8" x2="6.5" y2="13.2"/></svg></a>
  <a class="nav-icon" href="/lixeira" title="Lixeira"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></a>
  <a class="nav-icon active" href="/gerador" title="Criar Post"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></a>
</header>

<div class="container">

  <!-- STEPS -->
  <div class="steps">
    <div class="step-tab active" id="si1"><div class="step-num">1</div>Notícia &amp; Imagens</div>
    <div class="step-tab" id="si2"><div class="step-num">2</div>Preview &amp; Download</div>
  </div>

  <!-- ═══ TELA 1 ═══ -->
  <section class="panel active" id="p1">

    <div class="section-card">
      <div class="section-label"><div class="section-num">1</div>Texto da notícia</div>
      <textarea id="news" placeholder="Cole aqui o texto completo da notícia..."></textarea>
    </div>

    <div class="section-card">
      <div class="section-label"><div class="section-num">2</div>Imagens</div>
      <label class="upload-area" id="upload-area">
        <div class="upload-area-icon">📁</div>
        <div class="upload-area-text">Clique para selecionar imagens</div>
        <div class="upload-area-sub">
          1 imagem = Simples · 2 imagens = Simples com círculo · 3–6 imagens = Carrossel
        </div>
        <input type="file" accept="image/*" multiple id="img-input" style="display:none" onchange="handleImages(this)">
      </label>
      <div class="detect-badge" id="detect-badge" style="display:none;"></div>
      <div class="thumb-grid" id="thumb-grid"></div>
    </div>

    <div class="row">
      <button class="btn-primary" id="pbtn" onclick="process()">Gerar Post</button>
      <span class="pst" id="pst"></span>
    </div>
    <div class="err" id="perr" style="display:none;"></div>

  </section>

  <!-- ═══ TELA 2 ═══ -->
  <section class="panel" id="p2">
    <div class="playout">

      <!-- Preview -->
      <div>
        <div class="cwrap" id="cwrap">
          <div class="cscale" id="cscale"></div>
          <div class="drag-overlay" id="drag-overlay"></div>
        </div>
        <div class="drag-hint">Arraste para reposicionar a imagem</div>
        <div style="text-align:center;">
          <label class="swap-label">
            Trocar imagem
            <input type="file" accept="image/*" id="swap-input" style="display:none" onchange="swapImage(this)">
          </label>
        </div>
        <div class="snav" id="snav" style="display:none;"></div>
      </div>

      <!-- Edição + Download -->
      <div class="epanel">

        <div class="section-card" style="margin-bottom:0;">
          <div class="section-label" style="margin-bottom:14px;">Editar texto</div>

          <div class="fg" id="grp-title" style="margin-bottom:10px;">
            <label>Título</label>
            <input type="text" id="etitle" oninput="upd()">
          </div>
          <div class="fg" id="grp-sub" style="display:none; flex-direction:column; margin-bottom:10px;">
            <label>Subtítulo</label>
            <textarea id="esub" style="min-height:70px;" oninput="upd()"></textarea>
          </div>
          <div class="fg" id="grp-body" style="display:none; flex-direction:column; margin-bottom:10px;">
            <label>Corpo do slide atual</label>
            <textarea id="ebody" style="min-height:100px;" oninput="updBody()"></textarea>
          </div>
          <div id="grp-tf" style="display:none; flex-direction:column; gap:10px; margin-bottom:10px;">
            <div class="fg"><label>Nome do Jogador</label><input type="text" id="eplayer" oninput="upd()"></div>
            <div class="fg"><label>Tipo de Anúncio</label><input type="text" id="eanntype" oninput="upd()"></div>
          </div>
        </div>

        <div class="capbox">
          <div class="capt">Texto do post <span style="font-weight:400;font-size:0.75rem;color:#94a3b8;">(editável)</span></div>
          <textarea id="captext" rows="6" style="width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:10px;font-size:0.85rem;font-family:inherit;color:#1e293b;resize:vertical;margin-top:6px;line-height:1.5;">—</textarea>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
            <button class="cpbtn" onclick="copyCaption()" style="margin-top:0;">Copiar</button>
            <button class="cpbtn" id="twbtn" onclick="tweetCaption()" style="margin-top:0;background:#1a1a1a;color:#edeae4;border-color:#1a1a1a;">X · Twitter</button>
            <button class="cpbtn" id="igbtn" onclick="shareInstagram()" style="margin-top:0;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;border:none;">Instagram</button>
          </div>
          <p id="ig-hint" style="display:none;font-size:0.72rem;color:#888;margin-top:6px;">Legenda copiada — selecione as imagens baixadas no Instagram e cole.</p>
        </div>

        <div class="dlbox">
          <h3>Baixar posts</h3>
          <div class="dlrow">
            <button class="btn-primary" id="dlbtn" onclick="dlCurrent()">Baixar PNG</button>
            <button class="btn-outline" id="dlall" style="display:none;" onclick="dlAll()">Baixar ZIP</button>
          </div>
          <div class="dlst" id="dlst"></div>
        </div>

        <button class="btn-secondary" style="width:100%; justify-content:center;" onclick="goP(1)">← Voltar</button>

      </div>
    </div>
  </section>

</div><!-- /container -->


<div id="export-wrap"></div>

<script>
const S = {
  data: null, template: 'simples', selectedCount: 1,
  slides: [], curSlide: 0, uploadedImages: [], imgPositions: [],
};

function goP(n) {
  if (n === 2) { if (!S.data) return; prepPreview(); }
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.getElementById('p' + n).classList.add('active');
  window.scrollTo(0, 0);
  ['si1','si2'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
    if (i + 1 < n) el.classList.add('done');
    else if (i + 1 === n) el.classList.add('active');
  });
}

function handleImages(input) {
  const files = Array.from(input.files).slice(0, 6);
  if (!files.length) return;
  S.uploadedImages = new Array(files.length);
  let loaded = 0;
  files.forEach((f, i) => {
    const r = new FileReader();
    r.onload = e => { S.uploadedImages[i] = e.target.result; if (++loaded === files.length) detectMode(); };
    r.readAsDataURL(f);
  });
}

function detectMode() {
  const n = S.uploadedImages.filter(Boolean).length;
  S.selectedCount = n;
  S.template = n >= 3 ? 'carrossel' : 'simples';
  S.imgPositions = S.uploadedImages.map(() => ({ x: 50, y: 50 }));
  const badge = document.getElementById('detect-badge');
  badge.innerHTML = n === 1 ? '📷 <strong>Simples</strong> — 1 imagem de fundo'
    : n === 2 ? '👤 <strong>Simples com círculo</strong> — fundo + destaque'
    : `🎠 <strong>Carrossel — ${n} slides</strong>`;
  badge.style.display = 'flex';
  document.getElementById('upload-area').classList.add('has-images');
  renderThumbs();
}

function swapImage(input) {
  const f = input.files[0]; if (!f) return;
  const idx = S.template === 'carrossel' ? bgImgIdx(S.curSlide) : 0;
  const r = new FileReader();
  r.onload = e => { S.uploadedImages[idx] = e.target.result; S.imgPositions[idx] = {x:50,y:50}; upd(); input.value = ''; };
  r.readAsDataURL(f);
}

function renderThumbs() {
  const n = S.uploadedImages.length;
  const labels = n===1?['BG']:n===2?['BG','●']:S.uploadedImages.map((_,i)=>i===0?'CAPA':i===n-1?'CTA':String(i+1));
  document.getElementById('thumb-grid').innerHTML = S.uploadedImages.map((src,i)=>`
    <div class="thumb-item"><img src="${src}" alt=""><div class="thumb-num">${labels[i]}</div></div>`).join('');
}

async function process() {
  const news = document.getElementById('news').value.trim();
  if (!news)                { showErr('Cole o texto da notícia.'); return; }
  if (!S.uploadedImages[0]) { showErr('Selecione ao menos 1 imagem.'); return; }
  const btn = document.getElementById('pbtn');
  btn.disabled = true;
  document.getElementById('pst').innerHTML = '<span class="spinner"></span> Gerando post...';
  document.getElementById('perr').style.display = 'none';
  try {
    const _urlP = new URLSearchParams(window.location.search);
    const res = await fetch('/api/generate-post', {
      method: 'POST', headers: {'content-type':'application/json'},
      body: JSON.stringify({
        news, template: S.template, num_slides: S.selectedCount,
        already_translated: _urlP.get('translated') === '1',
        source: _urlP.get('source') || '',
        moon: _urlP.get('moon') || '',
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ' + res.status);
    S.data = data;
    document.getElementById('pst').textContent = '✅ Pronto!';
    btn.disabled = false;
    setTimeout(() => goP(2), 300);
  } catch(err) {
    showErr('Erro: ' + err.message);
    btn.disabled = false;
    document.getElementById('pst').textContent = '';
  }
}

function showErr(m) { const el = document.getElementById('perr'); el.textContent=m; el.style.display='block'; }

function prepPreview() {
  const t=S.template, data=S.data;
  document.getElementById('etitle').value = data.titulo    || '';
  document.getElementById('esub').value   = data.subtitulo || '';
  document.getElementById('captext').value = data.legenda_instagram || '—';
  if (data.nome_jogador) document.getElementById('eplayer').value  = data.nome_jogador;
  if (data.tipo_anuncio) document.getElementById('eanntype').value = data.tipo_anuncio;
  document.getElementById('grp-sub').style.display  = t==='carrossel'     ? 'flex' : 'none';
  document.getElementById('grp-body').style.display = t==='carrossel'     ? 'flex' : 'none';
  document.getElementById('grp-tf').style.display   = t==='transferencia' ? 'flex' : 'none';
  document.getElementById('dlbtn').style.display    = t!=='carrossel'     ? 'inline-flex' : 'none';
  document.getElementById('dlall').style.display    = t==='carrossel'     ? 'inline-flex' : 'none';
  S.slides = (t==='carrossel' && data.slides?.length) ? data.slides : [];
  S.curSlide = 0;
  buildSlideNav(); upd();
}

function buildSlideNav() {
  const nav = document.getElementById('snav');
  if (S.template!=='carrossel'||!S.slides.length) { nav.style.display='none'; return; }
  nav.style.display='flex';
  nav.innerHTML = S.slides.map((_,i)=>`<div class="sdot ${i===0?'on':''}" onclick="goslide(${i})"></div>`).join('');
}

function goslide(idx) {
  S.curSlide=idx;
  document.querySelectorAll('.sdot').forEach((d,i)=>d.classList.toggle('on',i===idx));
  if (S.slides[idx]) document.getElementById('ebody').value=S.slides[idx].corpo||'';
  upd();
}

function updBody() { const v=document.getElementById('ebody').value; if(S.slides[S.curSlide]) S.slides[S.curSlide].corpo=v; upd(); }

/* ── Card renderers ── */
function bgPhotoTag(cls='', src=null, imgIdx=0) {
  const img=src||S.uploadedImages[0]||'';
  const p=S.imgPositions[imgIdx]||{x:50,y:50};
  const bg=img?`background-image:url('${img}');background-position:${p.x}% ${p.y}%;`:'';
  return `<div class="layer-photo ${cls}" style="${bg}"></div>`;
}
function bgImgIdx(si) { return (S.template==='carrossel'&&S.uploadedImages[si])?si:0; }
function maskTag(file) { return `<img class="layer-mask" src="/masks/${file}" alt="" onerror="this.style.display='none'" onload="this.style.display='block'">`; }

function logoSVG(sz) {
  const id='L'+sz+Math.random().toString(36).slice(2,5);
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="98" fill="#201322" stroke="white" stroke-width="4"/>
    <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="17" cy="100" r="6" fill="white"/><circle cx="183" cy="100" r="6" fill="white"/>
    <path id="${id}a" d="M26,100 A74,74 0,0,1 174,100" fill="none"/>
    <text fill="white" font-weight="700" font-size="17" letter-spacing="3" font-family="Arial Black,Arial,sans-serif"><textPath href="#${id}a" startOffset="50%" text-anchor="middle">CENTRAL DO</textPath></text>
    <path id="${id}b" d="M26,100 A74,74 0,0,0 174,100" fill="none"/>
    <text fill="white" font-weight="700" font-size="17" letter-spacing="3" font-family="Arial Black,Arial,sans-serif"><textPath href="#${id}b" startOffset="50%" text-anchor="middle">ARABÃO</textPath></text>
    <path d="M100,38 A47,47 0,1,0 100,132 A31,31 0,1,1 100,38Z" fill="white"/>
    <rect x="97" y="46" width="6" height="46" rx="3" fill="#201322"/>
    <ellipse cx="100" cy="44" rx="21" ry="7" fill="#201322" transform="rotate(-30,100,44)"/>
    <ellipse cx="100" cy="44" rx="21" ry="7" fill="#201322" transform="rotate(30,100,44)"/>
    <ellipse cx="100" cy="42" rx="18" ry="6" fill="#201322"/>
    <ellipse cx="100" cy="44" rx="13" ry="5" fill="#201322" transform="rotate(-60,100,44)"/>
    <ellipse cx="100" cy="44" rx="13" ry="5" fill="#201322" transform="rotate(60,100,44)"/>
    <line x1="70" y1="106" x2="130" y2="131" stroke="#201322" stroke-width="5" stroke-linecap="round"/>
    <line x1="130" y1="106" x2="70" y2="131" stroke="#201322" stroke-width="5" stroke-linecap="round"/>
    <circle cx="70" cy="106" r="6.5" fill="#201322"/><circle cx="130" cy="106" r="6.5" fill="#201322"/>
  </svg>`;
}

function cardSimples() {
  const title=esc(document.getElementById('etitle').value||'TÍTULO CURTO E GRANDE');
  const circleEl=S.uploadedImages[1]?`<img class="layer-circle" src="${S.uploadedImages[1]}" alt="">`:'';
  return `<div class="igcard">${bgPhotoTag('',null,0)}<div class="layer-gradient"></div>${circleEl}${maskTag('simples_mask.png')}<div class="layer-text txt-simples-block"><div class="s-title">${title}</div></div></div>`;
}

function cardCarousel(idx) {
  const total=S.slides.length; if(!total) return cardSimples();
  const bi=bgImgIdx(idx), slideSrc=S.uploadedImages[bi]||'';
  if (idx===0) {
    const title=esc(document.getElementById('etitle').value||S.slides[0]?.titulo||'TÍTULO');
    const sub=esc(document.getElementById('esub').value||S.slides[0]?.corpo||'');
    return `<div class="igcard">${bgPhotoTag('',slideSrc,bi)}<div class="layer-gradient"></div>${maskTag('carrossel_mask.png')}<div class="layer-text txt-carr-block"><div class="c-title">${title}</div>${sub?`<div class="c-sub">${sub}</div>`:''}</div></div>`;
  }
  if (idx===total-1) {
    return `<div class="igcard carousel-internal">${bgPhotoTag('',slideSrc,bi)}${maskTag('carrossel_interno_mask.png')}<div class="layer-text txt-cta">SIGA @CENTRALDOARABAO</div><div class="layer-text txt-cta-sub">Mais notícias da<br>Saudi Pro League</div><div class="cta-logo">${logoSVG(150)}</div></div>`;
  }
  const sl=S.slides[idx]||{titulo:'SLIDE '+idx,corpo:''};
  const sbody=esc((idx===S.curSlide&&document.getElementById('ebody').value)||(sl.corpo||''));
  return `<div class="igcard carousel-internal">${bgPhotoTag('',slideSrc,bi)}${maskTag('carrossel_interno_mask.png')}<div class="slide-num">${idx}/${total-1}</div><div class="layer-text txt-ci-block"><div class="ci-title">${esc(sl.titulo||'')}</div><div class="ci-body">${sbody}</div></div></div>`;
}

function renderCard(t, idx) { return t==='carrossel' ? cardCarousel(idx) : cardSimples(); }

function upd() {
  const scaler=document.getElementById('cscale'), wrapper=document.getElementById('cwrap');
  if (!scaler||!wrapper) return;
  scaler.innerHTML=renderCard(S.template,S.curSlide);
  const scale=(wrapper.offsetWidth||540)/1080;
  scaler.style.transform=`scale(${scale})`;
  scaler.style.transformOrigin='top left';
  scaler.style.width='1080px'; scaler.style.height='1350px';
  wrapper.style.height=1350*scale+'px';
}

async function dlCurrent() {
  const btn=document.getElementById('dlbtn'); btn.disabled=true; setDs('Gerando PNG…');
  try { await dlSlide(S.curSlide,`arabao-${S.template}-${S.curSlide+1}.png`); setDs('✅ Download concluído!'); }
  catch(e) { setDs('Erro: '+e.message); }
  btn.disabled=false; setTimeout(()=>setDs(''),4000);
}

async function dlAll() {
  const total=S.slides.length; if(!total) return;
  const btn=document.getElementById('dlall'); btn.disabled=true;
  try {
    const zip=new JSZip();
    for (let i=0;i<total;i++) {
      setDs(`Gerando slide ${i+1}/${total}…`);
      const blob=await slideToBlob(i);
      const label=i===0?'01-capa':i===total-1?`${String(i+1).padStart(2,'0')}-cta`:`${String(i+1).padStart(2,'0')}-slide`;
      zip.file(`arabao-${label}.png`,blob);
    }
    setDs('Comprimindo ZIP…');
    const content=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a'); a.download='arabao-carrossel.zip';
    a.href=URL.createObjectURL(content); a.click(); URL.revokeObjectURL(a.href);
    setDs('✅ ZIP baixado!');
  } catch(e) { setDs('Erro: '+e.message); }
  btn.disabled=false; setTimeout(()=>setDs(''),5000);
}

async function slideToBlob(idx) {
  const wrap=document.getElementById('export-wrap');
  wrap.style.cssText='position:fixed;left:-1200px;top:0;width:1080px;height:1350px;overflow:hidden;z-index:-1;';
  wrap.innerHTML=renderCard(S.template,idx);
  await wait(400);
  const canvas=await html2canvas(wrap.querySelector('.igcard'),{width:1080,height:1350,scale:1,useCORS:true,allowTaint:true,backgroundColor:'#201322',logging:false,imageTimeout:0});
  wrap.innerHTML=''; wrap.style.cssText='position:fixed;left:-9999px;top:0;z-index:-1;pointer-events:none;';
  return new Promise(r=>canvas.toBlob(r,'image/png'));
}

async function dlSlide(idx,filename) {
  const blob=await slideToBlob(idx);
  const a=document.createElement('a'); a.download=filename;
  a.href=URL.createObjectURL(blob); a.click(); URL.revokeObjectURL(a.href);
}

function setDs(m) { document.getElementById('dlst').textContent=m; }
function wait(ms) { return new Promise(r=>setTimeout(r,ms)); }

async function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try { await navigator.clipboard.writeText(text); return true; } catch(e) {}
  }
  // Fallback for older/restricted browsers
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  const ok = document.execCommand('copy');
  document.body.removeChild(ta);
  return ok;
}

function copyCaption() {
  const text = document.getElementById('captext').value;
  copyToClipboard(text).then(ok => {
    const b = event.target;
    b.textContent = ok ? '✅ Copiado!' : '❌ Erro';
    setTimeout(() => b.textContent = '📋 Copiar', 2000);
  });
}

function tweetCaption() {
  const text = document.getElementById('captext').value;
  if (!text || text === '—') return;
  const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
  window.open(url, '_blank', 'noopener,noreferrer');
}

async function shareInstagram() {
  const text = document.getElementById('captext').value;
  if (!text || text === '—') { alert('Gere o post primeiro.'); return; }

  // Collect slide blobs
  const isCarrossel = S.template === 'carrossel' && S.selectedCount > 1;
  const blobs = [];
  if (isCarrossel) {
    for (let i = 0; i < S.selectedCount; i++) blobs.push(await slideToBlob(i));
  } else {
    blobs.push(await slideToBlob(S.curSlide));
  }
  const files = blobs.map((b, i) => new File([b], `arabao_${i+1}.png`, { type: 'image/png' }));

  // Always copy caption first (Instagram ignores text in Web Share by design)
  await copyToClipboard(text);

  // Mobile: Web Share API — opens native share sheet (Instagram, WhatsApp, etc.)
  if (navigator.canShare && navigator.canShare({ files })) {
    try {
      await navigator.share({ files });
      document.getElementById('ig-hint').style.display = 'block';
      return;
    } catch(e) {
      if (e.name === 'AbortError') return; // user cancelled
    }
  }

  // Desktop fallback: download images + open Instagram
  if (isCarrossel) { await dlAll(); } else { await dlCurrent(); }
  document.getElementById('ig-hint').style.display = 'block';
  setTimeout(() => window.open('https://www.instagram.com/', '_blank', 'noopener,noreferrer'), 600);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── Drag ── */
(function(){
  let dragging=false, startX, startY, startPos, activeIdx;
  function getIdx() { return S.template!=='carrossel'?0:bgImgIdx(S.curSlide); }
  function onDown(e) {
    if(!S.data) return; dragging=true;
    startX=e.clientX??e.touches[0].clientX; startY=e.clientY??e.touches[0].clientY;
    activeIdx=getIdx(); startPos={...(S.imgPositions[activeIdx]||{x:50,y:50})};
    document.getElementById('drag-overlay').classList.add('dragging'); e.preventDefault();
  }
  function onMove(e) {
    if(!dragging) return;
    const cx=e.clientX??e.touches[0].clientX, cy=e.clientY??e.touches[0].clientY;
    const wrap=document.getElementById('cwrap'), w=wrap.offsetWidth||540, h=wrap.offsetHeight||675;
    S.imgPositions[activeIdx]={x:Math.min(100,Math.max(0,startPos.x-(cx-startX)/w*100)),y:Math.min(100,Math.max(0,startPos.y-(cy-startY)/h*100))};
    upd();
  }
  function onUp() { dragging=false; document.getElementById('drag-overlay')?.classList.remove('dragging'); }
  document.addEventListener('DOMContentLoaded',()=>{
    const ov=document.getElementById('drag-overlay');
    ov.addEventListener('mousedown',onDown,{passive:false});
    ov.addEventListener('touchstart',onDown,{passive:false});
    document.addEventListener('mousemove',onMove);
    document.addEventListener('touchmove',onMove,{passive:true});
    document.addEventListener('mouseup',onUp);
    document.addEventListener('touchend',onUp);
  });
})();

/* ── Pré-preencher via URL ── */
document.addEventListener('DOMContentLoaded',()=>{
  const texto=new URLSearchParams(window.location.search).get('texto');
  if (texto) document.getElementById('news').value=texto;
});

window.addEventListener('resize',upd);
</script>
</body>
