<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IARABÃO — Criar Post</title>
<script>(function(){try{if(localStorage.getItem("iarabao_theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@font-face { font-family:'Antonio'; font-weight:700; src:url('/fonts/Antonio-Bold.ttf') format('truetype'); }
@font-face { font-family:'Antonio'; font-weight:600; src:url('/fonts/Antonio-SemiBold.ttf') format('truetype'); }
@font-face { font-family:'Poppins';  font-weight:400; src:url('/fonts/Poppins-Regular.ttf') format('truetype'); }
@font-face { font-family:'Poppins';  font-weight:500; src:url('/fonts/Poppins-Medium.ttf') format('truetype'); }

:root { --c-bg:#edeae4; --c-bg-card:#fafaf8; --c-bg-soft:#fff; --c-text:#1a1a1a; --c-muted-1:#999; --c-muted-2:#aaa; --c-muted-3:#777; --c-muted-4:#555; --c-muted-5:#666; --c-muted-6:#444; --c-line:#ccc; --c-border:rgba(0,0,0,.1); --c-border-2:rgba(0,0,0,.18); --c-hover-tint:rgba(0,0,0,.04); --c-success:#166534; --c-error:#be123c; }
:root[data-theme="dark"] { --c-bg:#16161a; --c-bg-card:#1e1e22; --c-bg-soft:#242428; --c-text:#ededee; --c-muted-1:#8c8c93; --c-muted-2:#84848a; --c-muted-3:#9c9ca2; --c-muted-4:#c2c0c7; --c-muted-5:#b0aeb5; --c-muted-6:#d4d2d8; --c-line:#3a3a40; --c-border:rgba(255,255,255,.1); --c-border-2:rgba(255,255,255,.2); --c-hover-tint:rgba(255,255,255,.06); --c-success:#4ade80; --c-error:#fb7185; }

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--c-bg); color: var(--c-text); }

/* ── HEADER ── */
header { background: var(--c-bg); border-bottom: 1px solid var(--c-border); padding: 0 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 10; height: 52px; gap: 6px; }
.brand { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.06em; color: var(--c-text); text-decoration: none; margin-right: auto; line-height: 1; }
.nav-icon { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--c-border-2); background: transparent; color: var(--c-muted-1); cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: all .15s; flex-shrink: 0; position: relative; }
.nav-icon:hover { border-color: var(--c-text); color: var(--c-text); background: var(--c-hover-tint); }
.nav-icon.active { background: var(--c-text); border-color: var(--c-text); color: var(--c-bg); }
.nav-icon[title]:hover::after { content: attr(title); position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); background: var(--c-text); color: var(--c-bg); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 8px; border-radius: 6px; white-space: nowrap; pointer-events: none; z-index: 100; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.theme-toggle .ico-sun { display: none; }
:root[data-theme="dark"] .theme-toggle .ico-moon { display: none; }
:root[data-theme="dark"] .theme-toggle .ico-sun { display: block; }

/* ── LOADING ── */
#loading-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: calc(100vh - 52px); gap: 16px;
}
.loading-ring {
  width: 44px; height: 44px; border-radius: 50%;
  border: 3px solid var(--c-border); border-top-color: var(--c-text);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label {
  font-size: 0.65rem; font-weight: 700; color: var(--c-muted-2);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.err-screen {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  height: calc(100vh - 52px); gap: 14px; text-align: center; padding: 0 24px;
}
.err-msg { font-size: 0.9rem; color: var(--c-error); font-weight: 600; }
.err-back { font-size: 0.65rem; font-weight: 700; color: var(--c-muted-1); text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; text-decoration: underline; }

/* ── CONTAINER ── */
.container { max-width: 1000px; margin: 0 auto; padding: 20px 20px 60px; display: none; }

/* ── TOP BAR ── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
}
.tmpl-switcher {
  display: flex; gap: 4px; background: var(--c-bg-card); border-radius: 99px; padding: 3px;
  border: 1.5px solid var(--c-border-2);
}
.tmpl-sw-btn {
  padding: 5px 13px; border-radius: 99px; border: none; background: transparent;
  font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--c-muted-1); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.tmpl-sw-btn:hover { color: var(--c-text); }
.tmpl-sw-btn.active { background: var(--c-text); color: #49fcb6; }
.btn-back {
  background: transparent; border: 1.5px solid var(--c-border-2); border-radius: 99px;
  padding: 6px 16px; font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--c-muted-1); cursor: pointer; transition: all .15s;
}
.btn-back:hover { border-color: var(--c-text); color: var(--c-text); }

/* ── LAYOUT ── */
.playout { display: grid; grid-template-columns: 240px 1fr; gap: 16px; align-items: start; }
@media (max-width: 820px) { .playout { grid-template-columns: 1fr; } }

/* ── PREVIEW COLUMN ── */
.preview-col { display: flex; flex-direction: column; gap: 10px; }

.upload-zone { display: flex; flex-direction: column; gap: 8px; }
.tmpl-upload-btn {
  width: 100%; padding: 14px 12px; border-radius: 14px;
  border: 1.5px solid var(--c-border-2); background: var(--c-bg-soft);
  cursor: pointer; transition: all .15s;
  font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
  letter-spacing: 0.05em; color: var(--c-text);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  text-align: center;
}
.tmpl-upload-btn:hover { border-color: var(--c-text); background: var(--c-hover-tint); }
.upload-zone.has-img .tmpl-upload-btn { background: var(--c-text); color: #49fcb6; border-color: var(--c-text); }
.thumb-row { display: flex; gap: 6px; flex-wrap: wrap; }
.thumb-item { position: relative; width: 52px; height: 52px; border-radius: 8px; overflow: hidden; border: 2px solid rgba(0,0,0,.1); }
.thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-num { position: absolute; top: 2px; left: 2px; background: rgba(0,0,0,.6); color: white; font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: 700; }

/* Preview card */
.cwrap {
  border-radius: 10px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.15); position: relative;
  width: 216px; flex-shrink: 0;
}
.cscale { transform-origin: top left; width: 1080px; height: 1350px; }
.drag-overlay { position: absolute; inset: 0; cursor: grab; z-index: 20; border-radius: 16px; }
.drag-overlay.dragging { cursor: grabbing; }
.drag-hint { text-align: center; margin-top: 6px; font-size: 0.62rem; color: var(--c-muted-2); text-transform: uppercase; letter-spacing: 0.06em; }

/* ── RIGHT PANEL ── */
.epanel { display: flex; flex-direction: column; gap: 10px; }
.section-card { background: var(--c-bg-card); border-radius: 16px; padding: 16px 18px; }
.section-label { font-size: 0.6rem; font-weight: 700; color: var(--c-muted-1); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

input[type="text"], textarea {
  width: 100%; background: var(--c-hover-tint); border: 1px solid var(--c-border); border-radius: 10px;
  color: var(--c-text); padding: 9px 12px; font-size: 0.88rem; font-family: inherit;
  transition: border-color .2s; resize: vertical;
}
input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--c-text); }
.fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.fg label { font-size: 0.6rem; font-weight: 700; color: var(--c-muted-1); text-transform: uppercase; letter-spacing: 0.07em; }

.capbox { background: var(--c-bg-card); border-radius: 16px; padding: 16px; }
.capt { font-size: 0.6rem; font-weight: 700; color: var(--c-muted-1); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

.btn-primary {
  background: var(--c-text); color: var(--c-bg); border: none; padding: 10px 22px;
  border-radius: 99px; font-size: 0.68rem; font-weight: 700; cursor: pointer;
  transition: opacity .15s; display: inline-flex; align-items: center; gap: 7px;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.btn-primary:hover:not(:disabled) { opacity: .75; }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; }
.cpbtn {
  background: none; border: 1.5px solid var(--c-border-2); color: var(--c-muted-3);
  padding: 5px 13px; border-radius: 99px; font-size: 0.62rem; font-weight: 700;
  cursor: pointer; transition: all .2s; text-transform: uppercase; letter-spacing: 0.06em;
}
.cpbtn:hover { border-color: var(--c-text); color: var(--c-text); }

.dlbox { background: var(--c-bg-card); border-radius: 16px; padding: 16px; text-align: center; }
.dlbox h3 { font-size: 0.6rem; font-weight: 700; color: var(--c-muted-1); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
.dlrow { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.dlst { margin-top: 8px; font-size: 0.72rem; color: var(--c-muted-3); min-height: 14px; }

#ig-hint { display:none; font-size:0.72rem; color:var(--c-muted-3); margin-top:6px; }

/* ── INSTAGRAM CARD (1080×1350) ── */
#export-wrap { position: fixed; left: -9999px; top: 0; z-index: -1; pointer-events: none; }
.igcard { width:1080px; height:1350px; position:relative; overflow:hidden; background:#201322; font-family:'Poppins',sans-serif; }
.igcard .layer-photo { position:absolute; inset:0; width:100%; height:100%; background-color:#2a1e2e; background-size:cover; background-repeat:no-repeat; z-index:1; }
.igcard .layer-gradient { position:absolute; inset:0; z-index:2; background:linear-gradient(to bottom, transparent 45%, rgba(0,0,0,0.18) 58%, rgba(0,0,0,0.80) 80%, rgba(0,0,0,0.92) 100%); pointer-events:none; }
.igcard .layer-text { position:absolute; z-index:5; pointer-events:none; }

/* Círculos de foto — tamanho/posição medidos nos mockups de referência (cada template tem o seu) */
.igcard .igc-circle { position:absolute; border-radius:50%; object-fit:cover; box-sizing:border-box; z-index:3; background:#2a1e2e; }
.igcard .circle-medio    { left:643px; top:432px; width:386px; height:386px; border:9px solid #10ED9D; }
.igcard .circle-longo    { left:573px; top:417px; width:464px; height:464px; border:9px solid #5CF3C0; }
.igcard .circle-transf-a { left:244px; top:822px; width:174px; height:174px; border:9px solid #8C52FF; }
.igcard .circle-transf-b { left:661px; top:822px; width:174px; height:174px; border:9px solid #49FEB6; }

/* Seta dupla entre os círculos da transferência */
.igcard .layer-arrow { position:absolute; left:457px; top:862px; width:166px; height:93px; z-index:3; pointer-events:none; }

/* Selo "Central do Arabão" — extraído dos mockups de referência */
.igcard .layer-logo-badge { position:absolute; z-index:3; pointer-events:none; }
.igcard .logo-badge-corner { top:36px; right:26px; width:96px; height:96px; opacity:0.16; }
.igcard .logo-badge-bottom { left:50%; bottom:76px; width:97px; height:96px; transform:translateX(-50%); opacity:0.92; }

/* Barra decorativa de cor (marca) */
.igcard .layer-bar { position:absolute; z-index:3; pointer-events:none; }
.igcard .bar-bottom { left:0; right:0; bottom:0; height:20px; background:linear-gradient(to right, #8C52FF 0 14%, #10ED9D 14% 45.3%, #303030 45.3% 77.2%, #fff 77.2% 100%); }
.igcard .bar-left   { left:0; top:782px; bottom:0; width:20px; background:linear-gradient(to bottom, #8C52FF 0 26.1%, #5CF3C0 26.1% 85.4%, #303030 85.4% 100%); }

/* CURTO — título + subtítulo, branco, centralizado, 1 foto */
.txt-curto-block { left:0; right:0; top:877px; bottom:54px; padding:0 90px; display:flex; flex-direction:column; align-items:center; gap:16px; }
.txt-curto-block .curto-title { font-family:'Poppins',sans-serif; font-weight:700; font-size:74px; letter-spacing:0.02em; line-height:0.78; color:#fff; text-transform:uppercase; text-align:center; width:100%; }
.txt-curto-block .curto-sub { font-family:'Poppins',sans-serif; font-weight:400; font-size:22px; letter-spacing:0.02em; line-height:1.4; color:#fff; text-align:center; width:100%; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }

/* MÉDIO / LONGO — título único, verde, 2 fotos (bg + círculo); cada um com seu próprio círculo/selo/barra */
.txt-destaque-block { left:0; right:0; top:1012px; bottom:135px; padding:0 68px; display:flex; flex-direction:column; justify-content:flex-start; }
.txt-destaque-block.align-center { align-items:center; }
.txt-destaque-block.align-left { align-items:flex-start; }
.txt-destaque-block .destaque-title { font-family:'Poppins',sans-serif; font-weight:700; font-size:75.9px; letter-spacing:-0.055em; line-height:0.8; color:#49fdb6; text-transform:uppercase; width:100%; }
.txt-destaque-block.align-center .destaque-title { text-align:center; }
.txt-destaque-block.align-left .destaque-title { text-align:left; }

/* TRANSFERÊNCIA — status + nome do jogador/treinador + fonte, centralizado, 1 foto + 2 logos */
.txt-transf-block { left:0; right:0; top:877px; bottom:54px; padding:0 90px; display:flex; flex-direction:column; align-items:center; gap:10px; }
.txt-transf-block .tf-status { font-family:'Poppins',sans-serif; font-weight:700; font-size:44.9px; letter-spacing:-0.055em; line-height:0.8; color:#fff; text-transform:uppercase; text-align:center; width:100%; }
.txt-transf-block .tf-player { font-family:'Poppins',sans-serif; font-weight:700; font-size:75.9px; letter-spacing:-0.055em; line-height:0.8; color:#49fdb6; text-transform:uppercase; text-align:center; width:100%; }
.txt-transf-block .tf-fonte { font-family:'Poppins',sans-serif; font-weight:400; font-size:21.4px; letter-spacing:-0.004em; line-height:1.45; color:#fff; text-align:center; width:100%; }

</style>
</head>
<body>

<header>
  <a class="brand" href="/">IARABÃO</a>
  <a class="nav-icon" href="/" title="Home"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></a>
  <a class="nav-icon" href="/descartadas" title="Descartadas"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg></a>
  <a class="nav-icon" href="/fontes" title="Fontes"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="19" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/><line x1="6.5" y1="10.8" x2="10.5" y2="6.2"/><line x1="13.5" y1="6.2" x2="17.5" y2="10.8"/><line x1="17.5" y1="13.2" x2="13.5" y2="17.8"/><line x1="10.5" y1="17.8" x2="6.5" y2="13.2"/></svg></a>
  <a class="nav-icon" href="/lixeira" title="Lixeira"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></a>
  <a class="nav-icon active" href="/gerador" title="Criar Post"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></a>
  <button class="nav-icon theme-toggle" type="button" onclick="toggleTheme()" title="Modo noturno">
    <svg class="ico-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="ico-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
  </button>
</header>

<!-- Loading -->
<div id="loading-screen">
  <div class="loading-ring"></div>
  <div class="loading-label">Gerando post...</div>
</div>

<!-- Error -->
<div class="err-screen" id="err-screen">
  <div class="err-msg" id="err-msg">Erro ao gerar post.</div>
  <span class="err-back" onclick="history.back()">← Voltar</span>
</div>

<!-- Main -->
<div class="container" id="main-container">
  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <button class="btn-back" onclick="history.back()">← Voltar</button>
      <div class="tmpl-switcher">
        <button class="tmpl-sw-btn active" id="sw-curto"        onclick="switchTemplate('curto')">Curto</button>
        <button class="tmpl-sw-btn" id="sw-medio"         onclick="switchTemplate('medio')">Médio</button>
        <button class="tmpl-sw-btn" id="sw-longo"         onclick="switchTemplate('longo')">Longo</button>
        <button class="tmpl-sw-btn" id="sw-transferencia" onclick="switchTemplate('transferencia')">Transferência</button>
      </div>
    </div>
  </div>

  <div class="playout">

    <!-- ── LEFT: Preview ── -->
    <div class="preview-col">

      <!-- Upload zone (before image) -->
      <div class="upload-zone" id="upload-zone">
        <label class="tmpl-upload-btn" id="upload-label">
          📁 Imagem
          <input type="file" accept="image/*" multiple id="img-input" style="display:none" onchange="handleImages(this)">
        </label>
        <div class="thumb-row" id="thumb-row"></div>
      </div>

      <!-- Preview card (hidden until image selected) -->
      <div id="cwrap-outer" style="display:none;">
        <div class="cwrap" id="cwrap">
          <div class="cscale" id="cscale"></div>
          <div class="drag-overlay" id="drag-overlay"></div>
        </div>
        <div class="drag-hint">Arraste para reposicionar a imagem</div>
      </div>

    </div>

    <!-- ── RIGHT: Edit + Download ── -->
    <div class="epanel">

      <div class="section-card">
        <div class="fg" id="grp-title">
          <label>Título <span id="title-hint" style="color:var(--c-muted-2);font-weight:400;text-transform:none;letter-spacing:0;"></span></label>
          <input type="text" id="etitle" oninput="upd()">
        </div>
        <div class="fg" id="grp-sub" style="display:none;">
          <label>Subtítulo</label>
          <textarea id="esub" style="min-height:60px;" oninput="upd()"></textarea>
        </div>
        <div id="grp-tf" style="display:none;">
          <div class="fg"><label>Nome do Jogador</label><input type="text" id="eplayer" oninput="upd()"></div>
          <div class="fg">
            <label>Status</label>
            <select id="estatus" oninput="upd()" style="width:100%;background:var(--c-hover-tint);border:1px solid var(--c-border);border-radius:10px;color:var(--c-text);padding:9px 12px;font-size:0.88rem;font-family:inherit;">
              <option value="">—</option>
              <option>Acerto</option><option>Anunciado</option><option>Avançado</option>
              <option>Consulta</option><option>Conversas</option><option>De Saída</option>
              <option>Encaminhado</option><option>Interesse</option><option>Melou</option>
              <option>Negociação</option><option>Oficial</option><option>Opção</option>
              <option>Proposta</option><option>Sondagem</option>
            </select>
          </div>
          <div class="fg">
            <label>Fonte</label>
            <div style="display:flex;align-items:center;gap:6px;">
              <input type="text" id="efonte" oninput="upd()" style="flex:1;">
              <span id="efonte-moon" style="font-size:1.2rem;flex-shrink:0;"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="capbox">
        <div class="capt">Legenda</div>
        <textarea id="captext" rows="5" style="width:100%;border:1px solid var(--c-border-2);border-radius:8px;padding:10px;font-size:0.85rem;font-family:inherit;color:var(--c-text);background:var(--c-bg-soft);resize:vertical;margin-top:6px;line-height:1.5;">—</textarea>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
          <button class="cpbtn" onclick="copyCaption()">Copiar</button>
          <button class="cpbtn" id="twbtn" onclick="tweetCaption()" style="background:var(--c-text);color:var(--c-bg);border-color:var(--c-text);">X · Twitter</button>
          <button class="cpbtn" id="igbtn" onclick="shareInstagram()" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;border:none;">Instagram</button>
        </div>
        <p id="ig-hint">Legenda copiada — selecione as imagens baixadas no Instagram e cole.</p>
      </div>

      <div class="dlbox">
        <h3>Baixar</h3>
        <div class="dlrow">
          <button class="btn-primary" id="dlbtn" onclick="dlCurrent()">Baixar PNG</button>
        </div>
        <div class="dlst" id="dlst"></div>
      </div>

    </div>
  </div>
</div>

<div id="export-wrap"></div>

<script>
function toggleTheme(){
  var html = document.documentElement;
  var isDark = html.getAttribute('data-theme') === 'dark';
  if (isDark) { html.removeAttribute('data-theme'); try{localStorage.setItem('iarabao_theme','light');}catch(e){} }
  else { html.setAttribute('data-theme','dark'); try{localStorage.setItem('iarabao_theme','dark');}catch(e){} }
}
const S = {
  data: null, template: 'curto',
  uploadedImages: [], imgPositions: [],
};

/* ── URL params ── */
const _P = new URLSearchParams(window.location.search);
const _news       = _P.get('texto')      || '';
const _source     = _P.get('source')     || '';
const _moon       = _P.get('moon')       || '';
const _translated = _P.get('translated') === '1';

/* ── Init ── */
document.addEventListener('DOMContentLoaded', async () => {
  if (!_news) { showErr('Nenhum texto recebido. Volte e tente novamente.'); return; }

  // Gera todas as variações (curto/médio/longo/transferência) em uma única chamada.
  try {
    const res = await fetch('/api/generate-post', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        news: _news, already_translated: _translated, source: _source, moon: _moon,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ' + res.status);
    S.data = data;
    prepPreview();
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main-container').style.display = 'block';
  } catch(e) {
    showErr(e.message);
  }
});

function showErr(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err-screen').style.display = 'flex';
}

/* ── Troca de tipo de post (instantânea — sem nova geração) ── */
function switchTemplate(newTmpl) {
  if (newTmpl === S.template) return;
  document.querySelectorAll('.tmpl-sw-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sw-' + newTmpl)?.classList.add('active');
  S.template = newTmpl;
  prepPreview();
  upd();
}

const TITLE_HINTS = {
  curto: '(até 3 palavras)', medio: '(até 7 palavras)',
  longo: '(até 10 palavras)', transferencia: '(transferência)',
};

function prepPreview() {
  const t = S.template, data = S.data;
  const titleByTmpl = {
    curto: data.titulo_curto, medio: data.titulo_medio,
    longo: data.titulo_longo, transferencia: data.titulo_transferencia,
  };
  document.getElementById('etitle').value    = titleByTmpl[t] || '';
  document.getElementById('esub').value      = t === 'curto' ? (data.subtitulo_curto || '') : '';
  document.getElementById('title-hint').textContent = TITLE_HINTS[t] || '';
  document.getElementById('captext').value   = data.legenda_instagram || '—';
  if (data.nome_jogador) document.getElementById('eplayer').value = data.nome_jogador;
  // Pre-fill fonte com o handle da fonte; moon mostrado separadamente
  document.getElementById('efonte').value = _source || '';
  document.getElementById('efonte-moon').textContent = _moon || '';
  // Status sugerido pela IA
  if (data.status_transferencia) {
    const sel = document.getElementById('estatus');
    for (const opt of sel.options) {
      if (opt.value.toLowerCase() === data.status_transferencia.toLowerCase()) { sel.value = opt.value; break; }
    }
  }

  document.getElementById('grp-sub').style.display = t === 'curto'         ? 'flex' : 'none';
  document.getElementById('grp-tf').style.display  = t === 'transferencia' ? 'flex' : 'none';
}

/* ── Image handling ── */
function handleImages(input) {
  // Sem limite fixo: cada template consome as imagens que precisa pela ordem
  // de upload (BG é sempre a 1ª; as demais — círculo ou logos — vêm depois).
  const files = Array.from(input.files);
  if (!files.length) return;
  S.uploadedImages = new Array(files.length);
  S.imgPositions   = files.map(() => ({ x: 50, y: 50 }));
  let loaded = 0;
  files.forEach((f, i) => {
    const r = new FileReader();
    r.onload = e => {
      S.uploadedImages[i] = e.target.result;
      if (++loaded === files.length) onImagesReady();
    };
    r.readAsDataURL(f);
  });
}

function onImagesReady() {
  const n = S.uploadedImages.length;
  const labels = n <= 2 ? (n === 1 ? ['BG'] : ['BG', '●']) : ['BG', ...Array.from({length: n - 1}, (_, i) => '●' + (i + 1))];
  document.getElementById('thumb-row').innerHTML = S.uploadedImages.map((src, i) =>
    `<div class="thumb-item"><img src="${src}" alt=""><div class="thumb-num">${labels[i]}</div></div>`
  ).join('');
  document.getElementById('upload-zone').classList.add('has-img');
  document.getElementById('cwrap-outer').style.display = 'block';
  upd();
}

/* ── Card renderers ── */
function bgPhotoTag(src) {
  const img = src || S.uploadedImages[0] || '';
  const p   = S.imgPositions[0] || { x: 50, y: 50 };
  const bg  = img ? `background-image:url('${img}');background-position:${p.x}% ${p.y}%;` : '';
  return `<div class="layer-photo" style="${bg}"></div>`;
}
function logoBadge(cls) { return `<img class="layer-logo-badge ${cls}" src="/masks/logo-arabao.png" alt="">`; }
const ARROW_SVG = `<svg class="layer-arrow" viewBox="0 0 166 93" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><polygon points="0,0 35,0 70,46.5 35,93 0,93 35,46.5" fill="#8C52FF"/><polygon points="45,0 80,0 115,46.5 80,93 45,93 80,46.5" fill="#8C52FF"/><polygon points="90,0 130,0 166,46.5 130,93 90,93 126,46.5" fill="#5CF3C0"/></svg>`;

function cardCurto() {
  const title = esc(document.getElementById('etitle').value || 'TÍTULO');
  const sub   = esc(document.getElementById('esub').value || '');
  return `<div class="igcard">${bgPhotoTag()}<div class="layer-gradient"></div>${logoBadge('logo-badge-corner')}<div class="layer-text txt-curto-block"><div class="curto-title">${title}</div>${sub ? `<div class="curto-sub">${sub}</div>` : ''}</div></div>`;
}

function cardMedio() {
  const title  = esc(document.getElementById('etitle').value || 'TÍTULO');
  const circle = S.uploadedImages[1] ? `<img class="igc-circle circle-medio" src="${S.uploadedImages[1]}" alt="">` : '';
  return `<div class="igcard">${bgPhotoTag()}<div class="layer-gradient"></div>${circle}${logoBadge('logo-badge-bottom')}<div class="layer-bar bar-bottom"></div><div class="layer-text txt-destaque-block align-center"><div class="destaque-title">${title}</div></div></div>`;
}

function cardLongo() {
  const title  = esc(document.getElementById('etitle').value || 'TÍTULO');
  const circle = S.uploadedImages[1] ? `<img class="igc-circle circle-longo" src="${S.uploadedImages[1]}" alt="">` : '';
  return `<div class="igcard">${bgPhotoTag()}<div class="layer-gradient"></div>${circle}${logoBadge('logo-badge-corner')}<div class="layer-bar bar-left"></div><div class="layer-text txt-destaque-block align-left"><div class="destaque-title">${title}</div></div></div>`;
}

function cardTransferencia() {
  const status = esc(document.getElementById('estatus').value || '');
  const player = esc(document.getElementById('eplayer').value || 'JOGADOR');
  const fonte  = esc(document.getElementById('efonte').value || '');
  const logoA  = S.uploadedImages[1] ? `<img class="igc-circle circle-transf-a" src="${S.uploadedImages[1]}" alt="">` : '';
  const logoB  = S.uploadedImages[2] ? `<img class="igc-circle circle-transf-b" src="${S.uploadedImages[2]}" alt="">` : '';
  return `<div class="igcard">${bgPhotoTag()}<div class="layer-gradient"></div>${logoA}${logoB}${ARROW_SVG}${logoBadge('logo-badge-corner')}<div class="layer-bar bar-bottom"></div><div class="layer-text txt-transf-block">${status ? `<div class="tf-status">${status}</div>` : ''}<div class="tf-player">${player}</div>${fonte ? `<div class="tf-fonte">${fonte}</div>` : ''}</div></div>`;
}

// Cada template tem agora seu próprio layout de imagem (medido nos mockups de referência):
// curto = título + subtítulo (branco, sem círculo) · médio = círculo pequeno + selo no centro-inferior
// · longo = círculo grande + selo no canto · transferência = 2 círculos + seta + selo no canto.
function renderCard(t) {
  if (t === 'curto') return cardCurto();
  if (t === 'medio') return cardMedio();
  if (t === 'transferencia') return cardTransferencia();
  return cardLongo();
}

function upd() {
  const scaler  = document.getElementById('cscale');
  const wrapper = document.getElementById('cwrap');
  if (!scaler || !wrapper || !S.uploadedImages[0]) return;
  scaler.innerHTML = renderCard(S.template);
  const scale = 0.2;
  scaler.style.transform       = `scale(${scale})`;
  scaler.style.transformOrigin = 'top left';
  scaler.style.width           = '1080px';
  scaler.style.height          = '1350px';
  wrapper.style.height         = 1350 * scale + 'px';
}

/* ── Export ── */
async function cardToBlob() {
  const wrap = document.getElementById('export-wrap');
  wrap.style.cssText = 'position:fixed;left:-1200px;top:0;width:1080px;height:1350px;overflow:hidden;z-index:-1;';
  wrap.innerHTML = renderCard(S.template);
  await wait(400);
  const canvas = await html2canvas(wrap.querySelector('.igcard'), {
    width:1080, height:1350, scale:1, useCORS:true, allowTaint:true,
    backgroundColor:'#201322', logging:false, imageTimeout:0
  });
  wrap.innerHTML = '';
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1;pointer-events:none;';
  return new Promise(r => canvas.toBlob(r, 'image/png'));
}

async function dlCurrent() {
  const btn = document.getElementById('dlbtn'); btn.disabled = true;
  setDs('Gerando PNG…');
  try {
    const blob = await cardToBlob();
    const a = document.createElement('a');
    a.download = `arabao-${S.template}.png`; a.href = URL.createObjectURL(blob); a.click(); URL.revokeObjectURL(a.href);
    setDs('✅ Download concluído!');
  } catch(e) { setDs('Erro: ' + e.message); }
  btn.disabled = false; setTimeout(() => setDs(''), 4000);
}

function setDs(m) { document.getElementById('dlst').textContent = m; }
function wait(ms)  { return new Promise(r => setTimeout(r, ms)); }

/* ── Caption / Share ── */
async function copyToClipboard(text) {
  if (navigator.clipboard?.writeText) { try { await navigator.clipboard.writeText(text); return true; } catch(e) {} }
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  const ok = document.execCommand('copy');
  document.body.removeChild(ta); return ok;
}

function copyCaption() {
  const text = document.getElementById('captext').value;
  copyToClipboard(text).then(ok => {
    const b = event.target;
    b.textContent = ok ? '✅ Copiado!' : '❌ Erro';
    setTimeout(() => b.textContent = 'Copiar', 2000);
  });
}

function tweetCaption() {
  const text = document.getElementById('captext').value;
  if (!text || text === '—') return;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank', 'noopener,noreferrer');
}

async function shareInstagram() {
  const text = document.getElementById('captext').value;
  if (!text || text === '—') { alert('Gere o post primeiro.'); return; }
  const blob = await cardToBlob();
  const file = new File([blob], 'arabao.png', { type: 'image/png' });
  await copyToClipboard(text);
  if (navigator.canShare?.({ files: [file] })) {
    try { await navigator.share({ files: [file] }); document.getElementById('ig-hint').style.display = 'block'; return; }
    catch(e) { if (e.name === 'AbortError') return; }
  }
  await dlCurrent();
  document.getElementById('ig-hint').style.display = 'block';
  setTimeout(() => window.open('https://www.instagram.com/', '_blank', 'noopener,noreferrer'), 600);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Drag to reposition ── */
(function() {
  let dragging = false, startX, startY, startPos;
  function onDown(e) {
    if (!S.uploadedImages[0]) return;
    dragging = true;
    startX = e.clientX ?? e.touches[0].clientX;
    startY = e.clientY ?? e.touches[0].clientY;
    startPos = { ...(S.imgPositions[0] || { x: 50, y: 50 }) };
    document.getElementById('drag-overlay').classList.add('dragging');
    e.preventDefault();
  }
  function onMove(e) {
    if (!dragging) return;
    const cx = e.clientX ?? e.touches[0].clientX, cy = e.clientY ?? e.touches[0].clientY;
    const wrap = document.getElementById('cwrap'), w = wrap.offsetWidth || 480, h = wrap.offsetHeight || 600;
    S.imgPositions[0] = {
      x: Math.min(100, Math.max(0, startPos.x - (cx - startX) / w * 100)),
      y: Math.min(100, Math.max(0, startPos.y - (cy - startY) / h * 100)),
    };
    upd();
  }
  function onUp() { dragging = false; document.getElementById('drag-overlay')?.classList.remove('dragging'); }
  document.addEventListener('DOMContentLoaded', () => {
    const ov = document.getElementById('drag-overlay');
    ov.addEventListener('mousedown', onDown, { passive: false });
    ov.addEventListener('touchstart', onDown, { passive: false });
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: true });
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchend', onUp);
  });
})();

window.addEventListener('resize', upd);
</script>
</body>
</html>
