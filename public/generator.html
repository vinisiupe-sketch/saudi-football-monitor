<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IARABÃO — Criar Post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@font-face { font-family:'Antonio'; font-weight:700; src:url('/fonts/Antonio-Bold.ttf') format('truetype'); }
@font-face { font-family:'Antonio'; font-weight:600; src:url('/fonts/Antonio-SemiBold.ttf') format('truetype'); }
@font-face { font-family:'Poppins';  font-weight:400; src:url('/fonts/Poppins-Regular.ttf') format('truetype'); }
@font-face { font-family:'Poppins';  font-weight:500; src:url('/fonts/Poppins-Medium.ttf') format('truetype'); }

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #edeae4; color: #1a1a1a; }

/* ── HEADER ── */
header { background: #edeae4; border-bottom: 1px solid rgba(0,0,0,.1); padding: 0 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 10; height: 52px; gap: 6px; }
.brand { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.06em; color: #1a1a1a; text-decoration: none; margin-right: auto; line-height: 1; }
.nav-icon { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,.18); background: transparent; color: #999; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: all .15s; flex-shrink: 0; position: relative; }
.nav-icon:hover { border-color: #1a1a1a; color: #1a1a1a; background: rgba(0,0,0,.04); }
.nav-icon.active { background: #1a1a1a; border-color: #1a1a1a; color: white; }
.nav-icon[title]:hover::after { content: attr(title); position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 8px; border-radius: 6px; white-space: nowrap; pointer-events: none; z-index: 100; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* ── LOADING ── */
#loading-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: calc(100vh - 52px); gap: 16px;
}
.loading-ring {
  width: 44px; height: 44px; border-radius: 50%;
  border: 3px solid rgba(0,0,0,.1); border-top-color: #1a1a1a;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label {
  font-size: 0.65rem; font-weight: 700; color: #aaa;
  text-transform: uppercase; letter-spacing: 0.1em;
}
.err-screen {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  height: calc(100vh - 52px); gap: 14px; text-align: center; padding: 0 24px;
}
.err-msg { font-size: 0.9rem; color: #be123c; font-weight: 600; }
.err-back { font-size: 0.65rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; text-decoration: underline; }

/* ── CONTAINER ── */
.container { max-width: 1000px; margin: 0 auto; padding: 20px 20px 60px; display: none; }

/* ── TOP BAR ── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
}
.tmpl-switcher {
  display: flex; gap: 4px; background: #fafaf8; border-radius: 99px; padding: 3px;
  border: 1.5px solid rgba(0,0,0,.12);
}
.tmpl-sw-btn {
  padding: 5px 13px; border-radius: 99px; border: none; background: transparent;
  font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
  color: #999; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.tmpl-sw-btn:hover { color: #1a1a1a; }
.tmpl-sw-btn.active { background: #1a1a1a; color: #49fcb6; }
.tmpl-sw-regen {
  font-size: 0.6rem; color: #aaa; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; display: none; align-items: center; gap: 6px;
}
.tmpl-pill {
  font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  padding: 4px 12px; border-radius: 99px; border: 1.5px solid #1a1a1a;
  background: #1a1a1a; color: #49fcb6;
}
.btn-back {
  background: transparent; border: 1.5px solid rgba(0,0,0,.18); border-radius: 99px;
  padding: 6px 16px; font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: #999; cursor: pointer; transition: all .15s;
}
.btn-back:hover { border-color: #1a1a1a; color: #1a1a1a; }

/* ── LAYOUT ── */
.playout { display: grid; grid-template-columns: 240px 1fr; gap: 16px; align-items: start; }
@media (max-width: 820px) { .playout { grid-template-columns: 1fr; } }

/* ── PREVIEW COLUMN ── */
.preview-col { display: flex; flex-direction: column; gap: 10px; }

.upload-zone { display: flex; flex-direction: column; gap: 8px; }
.tmpl-upload-btn {
  width: 100%; padding: 14px 12px; border-radius: 14px;
  border: 1.5px solid rgba(0,0,0,.18); background: white;
  cursor: pointer; transition: all .15s;
  font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
  letter-spacing: 0.05em; color: #1a1a1a;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  text-align: center;
}
.tmpl-upload-btn:hover { border-color: #1a1a1a; background: rgba(0,0,0,.03); }
.upload-zone.has-img .tmpl-upload-btn { background: #1a1a1a; color: #49fcb6; border-color: #1a1a1a; }
.thumb-row { display: flex; gap: 6px; flex-wrap: wrap; }
.thumb-item { position: relative; width: 52px; height: 52px; border-radius: 8px; overflow: hidden; border: 2px solid rgba(0,0,0,.1); }
.thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-num { position: absolute; top: 2px; left: 2px; background: rgba(0,0,0,.6); color: white; font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: 700; }

/* Preview card */
.cwrap {
  border-radius: 10px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.15); position: relative;
  width: 216px; flex-shrink: 0;
}
.cscale { transform-origin: top left; width: 1080px; height: 1350px; }
.drag-overlay { position: absolute; inset: 0; cursor: grab; z-index: 20; border-radius: 16px; }
.drag-overlay.dragging { cursor: grabbing; }
.drag-hint { text-align: center; margin-top: 6px; font-size: 0.62rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; }



.snav { display: flex; gap: 6px; justify-content: center; }
.sdot { width: 7px; height: 7px; border-radius: 50%; background: rgba(0,0,0,.2); cursor: pointer; transition: all .2s; }
.sdot.on { background: #1a1a1a; width: 18px; border-radius: 4px; }

/* ── RIGHT PANEL ── */
.epanel { display: flex; flex-direction: column; gap: 10px; }
.section-card { background: #fafaf8; border-radius: 16px; padding: 16px 18px; }
.section-label { font-size: 0.6rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

input[type="text"], textarea {
  width: 100%; background: rgba(0,0,0,.04); border: 1px solid rgba(0,0,0,.1); border-radius: 10px;
  color: #1a1a1a; padding: 9px 12px; font-size: 0.88rem; font-family: inherit;
  transition: border-color .2s; resize: vertical;
}
input[type="text"]:focus, textarea:focus { outline: none; border-color: #1a1a1a; }
.fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.fg label { font-size: 0.6rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.07em; }

.capbox { background: #fafaf8; border-radius: 16px; padding: 16px; }
.capt { font-size: 0.6rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

.btn-primary {
  background: #1a1a1a; color: #edeae4; border: none; padding: 10px 22px;
  border-radius: 99px; font-size: 0.68rem; font-weight: 700; cursor: pointer;
  transition: opacity .15s; display: inline-flex; align-items: center; gap: 7px;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.btn-primary:hover:not(:disabled) { opacity: .75; }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; }
.btn-outline {
  background: transparent; color: #1a1a1a; border: 1.5px solid #1a1a1a;
  padding: 9px 18px; border-radius: 99px; font-size: 0.68rem; font-weight: 700;
  cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.btn-outline:hover { background: #1a1a1a; color: #edeae4; }
.cpbtn {
  background: none; border: 1.5px solid rgba(0,0,0,.15); color: #777;
  padding: 5px 13px; border-radius: 99px; font-size: 0.62rem; font-weight: 700;
  cursor: pointer; transition: all .2s; text-transform: uppercase; letter-spacing: 0.06em;
}
.cpbtn:hover { border-color: #1a1a1a; color: #1a1a1a; }

.dlbox { background: #fafaf8; border-radius: 16px; padding: 16px; text-align: center; }
.dlbox h3 { font-size: 0.6rem; font-weight: 700; color: #999; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
.dlrow { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.dlst { margin-top: 8px; font-size: 0.72rem; color: #888; min-height: 14px; }

#ig-hint { display:none; font-size:0.72rem; color:#888; margin-top:6px; }

/* ── INSTAGRAM CARD (1080×1350) ── */
#export-wrap { position: fixed; left: -9999px; top: 0; z-index: -1; pointer-events: none; }
.igcard { width:1080px; height:1350px; position:relative; overflow:hidden; background:#201322; font-family:'Poppins',sans-serif; }
.igcard .layer-photo { position:absolute; inset:0; width:100%; height:100%; background-color:#2a1e2e; background-size:cover; background-repeat:no-repeat; z-index:1; }
.igcard .layer-gradient { position:absolute; inset:0; z-index:2; background:linear-gradient(to bottom, transparent 45%, rgba(0,0,0,0.18) 58%, rgba(0,0,0,0.80) 80%, rgba(0,0,0,0.92) 100%); pointer-events:none; }
.igcard .layer-circle { position:absolute; left:calc(787px - 177.5px); top:calc(698px - 177.5px); width:355px; height:355px; border-radius:50%; object-fit:cover; z-index:3; }
.igcard .layer-mask { position:absolute; inset:0; width:100%; height:100%; object-fit:fill; z-index:4; pointer-events:none; }
.igcard .layer-text { position:absolute; z-index:5; pointer-events:none; }
.txt-simples-block { left:0; right:0; top:1012px; bottom:135px; padding:0 68px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; }
.txt-simples-block .s-title { font-family:'Antonio',sans-serif; font-weight:700; font-size:65px; color:#49fcb6; text-transform:uppercase; line-height:1.05; text-align:center; width:100%; }
.txt-carr-block { left:0; right:0; top:877px; bottom:54px; padding:0 90px; display:flex; flex-direction:column; align-items:center; gap:16px; }
.txt-carr-block .c-title { font-family:'Poppins',sans-serif; font-weight:700; font-size:65px; color:#fff; text-transform:uppercase; line-height:1.05; text-align:center; width:100%; }
.txt-carr-block .c-sub { font-family:'Poppins',sans-serif; font-weight:400; font-size:28px; color:#fff; line-height:1.4; text-align:center; width:100%; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }
.txt-ci-block { left:0; right:0; top:810px; bottom:54px; padding:0 68px; display:flex; flex-direction:column; justify-content:flex-end; gap:14px; }
.txt-ci-block .ci-title { font-family:'Antonio',sans-serif; font-weight:600; font-size:44px; color:#49fcb6; text-transform:uppercase; line-height:1.1; }
.txt-ci-block .ci-body { font-family:'Poppins',sans-serif; font-weight:400; font-size:28px; color:#fff; line-height:1.3; display:-webkit-box; -webkit-line-clamp:6; -webkit-box-orient:vertical; overflow:hidden; }
.txt-cta { left:0; right:0; top:580px; font-family:'Antonio',sans-serif; font-weight:700; font-size:64px; color:#49fcb6; text-align:center; text-transform:uppercase; letter-spacing:3px; }
.txt-cta-sub { left:0; right:0; top:700px; font-family:'Poppins',sans-serif; font-weight:400; font-size:32px; color:#fff; text-align:center; line-height:1.6; }
.cta-logo { position:absolute; left:calc(50% - 75px); top:820px; width:150px; height:150px; z-index:5; }
.slide-num { position:absolute; right:90px; top:55px; font-family:'Poppins',sans-serif; font-size:24px; color:rgba(255,255,255,.25); z-index:5; }
.igcard.carousel-internal { background:#201322; }
.txt-chamativo-block { left:0; right:0; top:950px; bottom:100px; padding:0 68px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:20px; }
.txt-chamativo-block .ch-word { font-family:'Antonio',sans-serif; font-weight:700; font-size:140px; color:#49fcb6; text-transform:uppercase; line-height:1; text-align:center; width:100%; }
.txt-chamativo-block .ch-sub { font-family:'Poppins',sans-serif; font-weight:500; font-size:36px; color:#fff; line-height:1.4; text-align:center; width:100%; }

</style>
</head>
<body>

<header>
  <a class="brand" href="/">IARABÃO</a>
  <a class="nav-icon" href="/" title="Home"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></a>
  <a class="nav-icon" href="/descartadas" title="Descartadas"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg></a>
  <a class="nav-icon" href="/fontes" title="Fontes"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="19" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/><line x1="6.5" y1="10.8" x2="10.5" y2="6.2"/><line x1="13.5" y1="6.2" x2="17.5" y2="10.8"/><line x1="17.5" y1="13.2" x2="13.5" y2="17.8"/><line x1="10.5" y1="17.8" x2="6.5" y2="13.2"/></svg></a>
  <a class="nav-icon" href="/lixeira" title="Lixeira"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></a>
  <a class="nav-icon active" href="/gerador" title="Criar Post"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></a>
</header>

<!-- Loading -->
<div id="loading-screen">
  <div class="loading-ring"></div>
  <div class="loading-label">Gerando post...</div>
</div>

<!-- Error -->
<div class="err-screen" id="err-screen">
  <div class="err-msg" id="err-msg">Erro ao gerar post.</div>
  <span class="err-back" onclick="history.back()">← Voltar</span>
</div>

<!-- Main -->
<div class="container" id="main-container">
  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <button class="btn-back" onclick="history.back()">← Voltar</button>
      <div class="tmpl-switcher">
        <button class="tmpl-sw-btn" id="sw-simples"       onclick="switchTemplate('simples')">Simples</button>
        <button class="tmpl-sw-btn" id="sw-transferencia" onclick="switchTemplate('transferencia')">Transferência</button>
        <button class="tmpl-sw-btn" id="sw-chamativo"     onclick="switchTemplate('chamativo')">Chamativo</button>
        <button class="tmpl-sw-btn" id="sw-carrossel"     onclick="switchTemplate('carrossel')">Carrossel</button>
      </div>
    </div>
    <div id="slide-counter" style="font-size:0.62rem;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:.07em;display:none;"></div>
  </div>

  <div class="playout">

    <!-- ── LEFT: Preview ── -->
    <div class="preview-col">

      <!-- Upload zone (before image) -->
      <div class="upload-zone" id="upload-zone">
        <label class="tmpl-upload-btn" id="upload-label">
          📁 Imagem
          <input type="file" accept="image/*" multiple id="img-input" style="display:none" onchange="handleImages(this)">
        </label>
        <div class="thumb-row" id="thumb-row"></div>
      </div>

      <!-- Preview card (hidden until image selected) -->
      <div id="cwrap-outer" style="display:none;">
        <div class="cwrap" id="cwrap">
          <div class="cscale" id="cscale"></div>
          <div class="drag-overlay" id="drag-overlay"></div>
        </div>
        <div class="drag-hint">Arraste para reposicionar a imagem</div>

        <div class="snav" id="snav" style="display:none;margin-top:10px;"></div>
      </div>

    </div>

    <!-- ── RIGHT: Edit + Download ── -->
    <div class="epanel">

      <div class="section-card">
        <div class="fg" id="grp-title">
          <label>Título</label>
          <input type="text" id="etitle" oninput="upd()">
        </div>
        <div class="fg" id="grp-sub" style="display:none;">
          <label>Subtítulo</label>
          <textarea id="esub" style="min-height:60px;" oninput="upd()"></textarea>
        </div>
        <div class="fg" id="grp-body" style="display:none;">
          <label>Corpo do slide atual</label>
          <textarea id="ebody" style="min-height:90px;" oninput="updBody()"></textarea>
        </div>
        <div id="grp-tf" style="display:none;">
          <div class="fg"><label>Nome do Jogador</label><input type="text" id="eplayer" oninput="upd()"></div>
          <div class="fg">
            <label>Status</label>
            <select id="estatus" oninput="upd()" style="width:100%;background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.1);border-radius:10px;color:#1a1a1a;padding:9px 12px;font-size:0.88rem;font-family:inherit;">
              <option value="">—</option>
              <option>Negociação</option><option>Sondagem</option><option>Interesse</option>
              <option>Proposta</option><option>Oficial</option><option>Opção</option>
              <option>Anunciado</option><option>Conversas</option><option>Melou</option>
              <option>Acerto</option><option>Consulta</option><option>Encaminhado</option>
              <option>Avançado</option><option>De Saída</option>
            </select>
          </div>
          <div class="fg">
            <label>Fonte</label>
            <div style="display:flex;align-items:center;gap:6px;">
              <input type="text" id="efonte" oninput="upd()" style="flex:1;">
              <span id="efonte-moon" style="font-size:1.2rem;flex-shrink:0;"></span>

          </div>
        </div>
      </div>

      <div class="capbox">
        <div class="capt">Legenda</div>
        <textarea id="captext" rows="5" style="width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:10px;font-size:0.85rem;font-family:inherit;color:#1e293b;resize:vertical;margin-top:6px;line-height:1.5;">—</textarea>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
          <button class="cpbtn" onclick="copyCaption()">Copiar</button>
          <button class="cpbtn" id="twbtn" onclick="tweetCaption()" style="background:#1a1a1a;color:#edeae4;border-color:#1a1a1a;">X · Twitter</button>
          <button class="cpbtn" id="igbtn" onclick="shareInstagram()" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;border:none;">Instagram</button>
        </div>
        <p id="ig-hint">Legenda copiada — selecione as imagens baixadas no Instagram e cole.</p>
      </div>

      <div class="dlbox">
        <h3>Baixar</h3>
        <div class="dlrow">
          <button class="btn-primary" id="dlbtn" onclick="dlCurrent()">Baixar PNG</button>
          <button class="btn-outline" id="dlall" style="display:none;" onclick="dlAll()">Baixar Todas</button>
        </div>
        <div class="dlst" id="dlst"></div>
      </div>

    </div>
  </div>
</div>

<div id="export-wrap"></div>

<script>
const S = {
  data: null, carrosselData: null, template: 'simples', numSlides: 3,
  slides: [], curSlide: 0, uploadedImages: [], imgPositions: [],
};

/* ── URL params ── */
const _P = new URLSearchParams(window.location.search);
const _news       = _P.get('texto')      || '';
const _source     = _P.get('source')     || '';
const _moon       = _P.get('moon')       || '';
const _translated = _P.get('translated') === '1';
S.template  = _P.get('template') || 'simples';
S.numSlides = Math.min(6, Math.max(3, parseInt(_P.get('slides') || '3')));

/* ── Init ── */
document.addEventListener('DOMContentLoaded', async () => {
  // Update pill label
  // Mark active template button
  document.querySelectorAll('.tmpl-sw-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sw-' + S.template)?.classList.add('active');
  if (S.template === 'chamativo') document.getElementById('sw-chamativo')?.classList.add('active');

  // Update upload hint
  if (S.template === 'carrossel') {
    // hint removed
  }

  if (!_news) { showErr('Nenhum texto recebido. Volte e tente novamente.'); return; }

  // Call generate API
  try {
    const res = await fetch('/api/generate-post', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        news: _news, template: S.template, num_slides: S.numSlides,
        already_translated: _translated, source: _source, moon: _moon,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ' + res.status);
    S.data = data;
    if (S.template === 'carrossel') S.carrosselData = data;
    prepPreview();
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main-container').style.display = 'block';
  } catch(e) {
    showErr(e.message);
  }
});

function showErr(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err-screen').style.display = 'flex';
}


// Templates that reuse existing data (no new API call needed)
const INSTANT_TEMPLATES = new Set(['simples', 'transferencia', 'chamativo']);

async function switchTemplate(newTmpl) {
  if (newTmpl === S.template) return;

  // Mark active button
  document.querySelectorAll('.tmpl-sw-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sw-' + newTmpl)?.classList.add('active');
  S.template = newTmpl;
  S.curSlide = 0;

  if (INSTANT_TEMPLATES.has(newTmpl)) {
    // Instant switch — data already available
    prepPreview();
    upd();
  } else {
    // Carrossel — use cached data if already generated, otherwise call API
    if (S.carrosselData) {
      S.data = S.carrosselData;
      prepPreview();
      upd();
    } else {
      const ov = document.getElementById('switch-overlay');
      ov.style.display = 'flex';
      try {
        const res = await fetch('/api/generate-post', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            news: _news, template: 'carrossel', num_slides: S.numSlides,
            already_translated: _translated, source: _source, moon: _moon,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erro ' + res.status);
        S.data = data;
        S.carrosselData = data;
        prepPreview();
        upd();
      } catch(e) {
        document.getElementById('slide-counter').textContent = 'Erro: ' + e.message;
        document.getElementById('slide-counter').style.display = 'block';
        setTimeout(() => { document.getElementById('slide-counter').style.display = 'none'; }, 3000);
      } finally {
        ov.style.display = 'none';
      }
    }
  }
}

function prepPreview() {
  const t = S.template, data = S.data;
  document.getElementById('etitle').value   = data.titulo    || '';
  document.getElementById('esub').value     = data.subtitulo || '';
  document.getElementById('captext').value  = data.legenda_instagram || '—';
  if (data.nome_jogador) document.getElementById('eplayer').value = data.nome_jogador;
  // Pre-fill fonte with source handle; moon shown separately
  document.getElementById('efonte').value = _source || '';
  document.getElementById('efonte-moon').textContent = _moon || '';

  document.getElementById('grp-sub').style.display   = (t === 'carrossel' || t === 'chamativo') ? 'flex' : 'none';
  document.getElementById('grp-body').style.display  = t === 'carrossel'     ? 'flex' : 'none';
  document.getElementById('grp-tf').style.display    = t === 'transferencia' ? 'flex' : 'none';
  document.getElementById('dlbtn').style.display     = t !== 'carrossel'     ? 'inline-flex' : 'none';
  document.getElementById('dlall').style.display     = t === 'carrossel'     ? 'inline-flex' : 'none';

  S.slides   = (t === 'carrossel' && data.slides?.length) ? data.slides : [];
  S.curSlide = 0;
  buildSlideNav();
}

/* ── Image handling ── */
function handleImages(input) {
  const max = S.template === 'carrossel' ? S.numSlides : 2;
  const files = Array.from(input.files).slice(0, max);
  if (!files.length) return;
  S.uploadedImages = new Array(files.length);
  S.imgPositions   = files.map(() => ({ x: 50, y: 50 }));
  let loaded = 0;
  files.forEach((f, i) => {
    const r = new FileReader();
    r.onload = e => {
      S.uploadedImages[i] = e.target.result;
      if (++loaded === files.length) onImagesReady();
    };
    r.readAsDataURL(f);
  });
}

function onImagesReady() {
  const n = S.uploadedImages.length;
  // Thumbnails
  const labels = S.template === 'carrossel'
    ? S.uploadedImages.map((_, i) => i === 0 ? 'CAPA' : i === n-1 ? 'CTA' : String(i+1))
    : n === 1 ? ['BG'] : ['BG', '●'];
  document.getElementById('thumb-row').innerHTML = S.uploadedImages.map((src, i) =>
    `<div class="thumb-item"><img src="${src}" alt=""><div class="thumb-num">${labels[i]}</div></div>`
  ).join('');
  document.getElementById('upload-zone').classList.add('has-img');
  document.getElementById('cwrap-outer').style.display = 'block';
  upd();
}



/* ── Slide nav ── */
function buildSlideNav() {
  const nav = document.getElementById('snav');
  const ctr = document.getElementById('slide-counter');
  if (S.template !== 'carrossel' || !S.slides.length) { nav.style.display = 'none'; ctr.style.display = 'none'; return; }
  nav.style.display = 'flex';
  ctr.style.display = 'block';
  ctr.textContent = `Slide ${S.curSlide + 1} / ${S.slides.length}`;
  nav.innerHTML = S.slides.map((_, i) =>
    `<div class="sdot ${i === 0 ? 'on' : ''}" onclick="goslide(${i})"></div>`
  ).join('');
}

function goslide(idx) {
  S.curSlide = idx;
  document.querySelectorAll('.sdot').forEach((d, i) => d.classList.toggle('on', i === idx));
  if (S.slides[idx]) document.getElementById('ebody').value = S.slides[idx].corpo || '';
  document.getElementById('slide-counter').textContent = `Slide ${idx + 1} / ${S.slides.length}`;
  upd();
}

function updBody() {
  const v = document.getElementById('ebody').value;
  if (S.slides[S.curSlide]) S.slides[S.curSlide].corpo = v;
  upd();
}

/* ── Card renderers ── */
function bgPhotoTag(src, imgIdx) {
  const img = src || S.uploadedImages[0] || '';
  const p   = S.imgPositions[imgIdx] || { x: 50, y: 50 };
  const bg  = img ? `background-image:url('${img}');background-position:${p.x}% ${p.y}%;` : '';
  return `<div class="layer-photo" style="${bg}"></div>`;
}
function bgImgIdx(si) { return (S.template === 'carrossel' && S.uploadedImages[si]) ? si : 0; }
function maskTag(file) { return `<img class="layer-mask" src="/masks/${file}" alt="" onerror="this.style.display='none'">`; }

    <ellipse cx="100" cy="44" rx="13" ry="5" fill="#201322" transform="rotate(-60,100,44)"/>

function cardSimples() {
  const title = esc(document.getElementById('etitle').value || 'TÍTULO');
  const circle = S.uploadedImages[1] ? `<img class="layer-circle" src="${S.uploadedImages[1]}" alt="">` : '';
  return `<div class="igcard">${bgPhotoTag(null, 0)}<div class="layer-gradient"></div>${circle}${maskTag('simples_mask.png')}<div class="layer-text txt-simples-block"><div class="s-title">${title}</div></div></div>`;
}

function cardCarousel(idx) {
  const total = S.slides.length; if (!total) return cardSimples();
  const bi = bgImgIdx(idx), slideSrc = S.uploadedImages[bi] || '';
  if (idx === 0) {
    const title = esc(document.getElementById('etitle').value || S.slides[0]?.titulo || 'TÍTULO');
    const sub   = esc(document.getElementById('esub').value   || S.slides[0]?.corpo  || '');
    return `<div class="igcard">${bgPhotoTag(slideSrc, bi)}<div class="layer-gradient"></div>${maskTag('carrossel_mask.png')}<div class="layer-text txt-carr-block"><div class="c-title">${title}</div>${sub ? `<div class="c-sub">${sub}</div>` : ''}</div></div>`;
  }
  if (idx === total - 1) {
    return `<div class="igcard carousel-internal">${bgPhotoTag(slideSrc, bi)}${maskTag('carrossel_interno_mask.png')}<div class="layer-text txt-cta">SIGA @CENTRALDOARABAO</div><div class="layer-text txt-cta-sub">Mais notícias da<br>Saudi Pro League</div><div class="cta-logo">${logoSVG(150)}</div></div>`;
  }
  const sl    = S.slides[idx] || { titulo: 'SLIDE ' + idx, corpo: '' };
  const sbody = esc((idx === S.curSlide && document.getElementById('ebody').value) || (sl.corpo || ''));
  return `<div class="igcard carousel-internal">${bgPhotoTag(slideSrc, bi)}${maskTag('carrossel_interno_mask.png')}<div class="slide-num">${idx}/${total-1}</div><div class="layer-text txt-ci-block"><div class="ci-title">${esc(sl.titulo || '')}</div><div class="ci-body">${sbody}</div></div></div>`;
}

function cardChamativo() {
  const word = esc(document.getElementById('etitle').value || 'BOMBA');
  const sub  = esc(document.getElementById('esub').value || '').replace(/\n/g, '<br>');
  return `<div class="igcard">${bgPhotoTag(null, 0)}<div class="layer-gradient"></div>${maskTag('simples_mask.png')}<div class="layer-text txt-chamativo-block"><div class="ch-word">${word}</div><div class="ch-sub">${sub}</div></div></div>`;
}

function renderCard(t, idx) { return t === 'carrossel' ? cardCarousel(idx) : t === 'chamativo' ? cardChamativo() : cardSimples(); }

function upd() {
  const scaler  = document.getElementById('cscale');
  const wrapper = document.getElementById('cwrap');
  if (!scaler || !wrapper || !S.uploadedImages[0]) return;
  scaler.innerHTML = renderCard(S.template, S.curSlide);
  const scale = 0.2;
  scaler.style.transform       = `scale(${scale})`;
  scaler.style.transformOrigin = 'top left';
  scaler.style.width           = '1080px';
  scaler.style.height          = '1350px';
  wrapper.style.height         = 1350 * scale + 'px';
}

/* ── Export ── */
async function slideToBlob(idx) {
  const wrap = document.getElementById('export-wrap');
  wrap.style.cssText = 'position:fixed;left:-1200px;top:0;width:1080px;height:1350px;overflow:hidden;z-index:-1;';
  wrap.innerHTML = renderCard(S.template, idx);
  await wait(400);
  const canvas = await html2canvas(wrap.querySelector('.igcard'), {
    width:1080, height:1350, scale:1, useCORS:true, allowTaint:true,
    backgroundColor:'#201322', logging:false, imageTimeout:0
  });
  wrap.innerHTML = '';
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1;pointer-events:none;';
  return new Promise(r => canvas.toBlob(r, 'image/png'));
}

async function dlCurrent() {
  const btn = document.getElementById('dlbtn'); btn.disabled = true;
  setDs('Gerando PNG…');
  try { await dlSlide(S.curSlide, `arabao-${S.template}.png`); setDs('✅ Download concluído!'); }
  catch(e) { setDs('Erro: ' + e.message); }
  btn.disabled = false; setTimeout(() => setDs(''), 4000);
}

async function dlAll() {
  const total = S.slides.length; if (!total) return;
  const btn = document.getElementById('dlall'); btn.disabled = true;
  try {
    for (let i = 0; i < total; i++) {
      setDs(`Gerando imagem ${i+1}/${total}…`);
      const blob  = await slideToBlob(i);
      const label = i === 0 ? '01-capa' : i === total-1 ? `${String(i+1).padStart(2,'0')}-cta` : `${String(i+1).padStart(2,'0')}-slide`;
      await dlSlide(i, `arabao-${label}.png`);
      await wait(200);
    }
    setDs('✅ Imagens baixadas!');
  } catch(e) { setDs('Erro: ' + e.message); }
  btn.disabled = false; setTimeout(() => setDs(''), 5000);
}

async function dlSlide(idx, filename) {
  const blob = await slideToBlob(idx);
  const a = document.createElement('a');
  a.download = filename; a.href = URL.createObjectURL(blob); a.click(); URL.revokeObjectURL(a.href);
}

function setDs(m) { document.getElementById('dlst').textContent = m; }
function wait(ms)  { return new Promise(r => setTimeout(r, ms)); }

/* ── Caption / Share ── */
async function copyToClipboard(text) {
  if (navigator.clipboard?.writeText) { try { await navigator.clipboard.writeText(text); return true; } catch(e) {} }
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  const ok = document.execCommand('copy');
  document.body.removeChild(ta); return ok;
}

function copyCaption() {
  const text = document.getElementById('captext').value;
  copyToClipboard(text).then(ok => {
    const b = event.target;
    b.textContent = ok ? '✅ Copiado!' : '❌ Erro';
    setTimeout(() => b.textContent = 'Copiar', 2000);
  });
}

function tweetCaption() {
  const text = document.getElementById('captext').value;
  if (!text || text === '—') return;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank', 'noopener,noreferrer');
}

async function shareInstagram() {
  const text = document.getElementById('captext').value;
  if (!text || text === '—') { alert('Gere o post primeiro.'); return; }
  const isCarrossel = S.template === 'carrossel' && S.slides.length > 1;
  const blobs = [];
  if (isCarrossel) { for (let i = 0; i < S.slides.length; i++) blobs.push(await slideToBlob(i)); }
  else blobs.push(await slideToBlob(S.curSlide));
  const files = blobs.map((b, i) => new File([b], `arabao_${i+1}.png`, { type: 'image/png' }));
  await copyToClipboard(text);
  if (navigator.canShare?.({ files })) {
    try { await navigator.share({ files }); document.getElementById('ig-hint').style.display = 'block'; return; }
    catch(e) { if (e.name === 'AbortError') return; }
  }
  if (isCarrossel) { await dlAll(); } else { await dlCurrent(); }
  document.getElementById('ig-hint').style.display = 'block';
  setTimeout(() => window.open('https://www.instagram.com/', '_blank', 'noopener,noreferrer'), 600);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Drag to reposition ── */
(function() {
  let dragging = false, startX, startY, startPos, activeIdx;
  function getIdx() { return S.template !== 'carrossel' ? 0 : bgImgIdx(S.curSlide); }
  function onDown(e) {
    if (!S.uploadedImages[0]) return;
    dragging = true;
    startX = e.clientX ?? e.touches[0].clientX;
    startY = e.clientY ?? e.touches[0].clientY;
    activeIdx = getIdx();
    startPos = { ...(S.imgPositions[activeIdx] || { x: 50, y: 50 }) };
    document.getElementById('drag-overlay').classList.add('dragging');
    e.preventDefault();
  }
  function onMove(e) {
    if (!dragging) return;
    const cx = e.clientX ?? e.touches[0].clientX, cy = e.clientY ?? e.touches[0].clientY;
    const wrap = document.getElementById('cwrap'), w = wrap.offsetWidth || 480, h = wrap.offsetHeight || 600;
    S.imgPositions[activeIdx] = {
      x: Math.min(100, Math.max(0, startPos.x - (cx - startX) / w * 100)),
      y: Math.min(100, Math.max(0, startPos.y - (cy - startY) / h * 100)),
    };
    upd();
  }
  function onUp() { dragging = false; document.getElementById('drag-overlay')?.classList.remove('dragging'); }
  document.addEventListener('DOMContentLoaded', () => {
    const ov = document.getElementById('drag-overlay');
    ov.addEventListener('mousedown', onDown, { passive: false });
    ov.addEventListener('touchstart', onDown, { passive: false });
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: true });
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchend', onUp);
  });
})();

window.addEventListener('resize', upd);
</script>
